<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuljetuskustannuslaskuri — Demo</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232733;
    --border: #2d3140;
    --text: #e4e6ef;
    --text2: #8b8fa3;
    --accent: #4f7cff;
    --accent2: #6c5ce7;
    --green: #00d68f;
    --red: #ff6b6b;
    --orange: #ffa94d;
    --own-color: #4f7cff;
    --buy-color: #ff6b6b;
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .header {
    background: linear-gradient(135deg, #1a1d27 0%, #232733 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header .subtitle { color: var(--text2); font-size: 13px; margin-top: 2px; }
  .header-right { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    color: var(--text2);
  }
  .badge.live { border-color: var(--green); color: var(--green); }
  .badge.demo-badge { border-color: var(--orange); color: var(--orange); }

  .disclaimer {
    background: rgba(255, 169, 77, 0.1);
    border: 1px solid rgba(255, 169, 77, 0.3);
    border-radius: var(--radius);
    padding: 14px 20px;
    margin: 16px 32px 0;
    font-size: 13px;
    color: var(--orange);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .disclaimer strong { color: #ffc078; }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--accent);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: 8px;
    transition: all 0.2s;
  }
  .back-link:hover { background: rgba(79, 124, 255, 0.1); }

  .tabs {
    display: flex;
    gap: 4px;
    padding: 16px 32px 0;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }
  .tab {
    padding: 10px 20px;
    border: none;
    background: none;
    color: var(--text2);
    font-size: 14px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
    font-family: inherit;
  }
  .tab:hover { color: var(--text); }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    font-weight: 600;
  }
  .tab.summary-tab { color: var(--accent2); font-weight: 600; }
  .tab.summary-tab.active { border-bottom-color: var(--accent2); }

  .main { padding: 24px 32px; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .kpi-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
  }
  .kpi-card .label { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
  .kpi-card .value { font-size: 26px; font-weight: 700; margin-top: 6px; }
  .kpi-card .value.blue { color: var(--accent); }
  .kpi-card .value.green { color: var(--green); }
  .kpi-card .value.red { color: var(--red); }
  .kpi-card .value.orange { color: var(--orange); }

  .table-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 24px;
  }
  .table-title {
    padding: 16px 20px;
    font-size: 15px;
    font-weight: 600;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .table-title .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot.own { background: var(--own-color); }
  .dot.buy { background: var(--buy-color); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    background: var(--surface2);
    padding: 10px 12px;
    text-align: right;
    font-weight: 600;
    color: var(--text2);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    white-space: nowrap;
    position: sticky;
    top: 0;
  }
  th:first-child { text-align: left; }
  td { padding: 10px 12px; text-align: right; border-bottom: 1px solid var(--border); }
  td:first-child { text-align: left; font-weight: 600; }
  tr:hover td { background: rgba(79, 124, 255, 0.05); }
  tr.total-row td { font-weight: 700; border-top: 2px solid var(--accent); background: rgba(79, 124, 255, 0.05); }
  tr.own-total td { border-top: 2px solid var(--own-color); background: rgba(79, 124, 255, 0.08); }
  tr.buy-total td { border-top: 2px solid var(--buy-color); background: rgba(255, 107, 107, 0.08); }
  .driver-type { font-size: 10px; padding: 2px 8px; border-radius: 10px; margin-left: 6px; font-weight: 500; }
  .driver-type.own { background: rgba(79, 124, 255, 0.15); color: var(--own-color); }
  .driver-type.buy { background: rgba(255, 107, 107, 0.15); color: var(--buy-color); }
  .calc-value { color: var(--green); font-weight: 500; font-variant-numeric: tabular-nums; }
  tr.cat-header td {
    background: var(--surface2);
    font-weight: 700;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--accent);
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }

  .charts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
    gap: 20px;
    margin-bottom: 24px;
  }
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }
  .chart-card h3 { font-size: 14px; margin-bottom: 16px; color: var(--text2); }

  .roi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .roi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }
  .roi-card h3 { font-size: 15px; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .roi-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; font-size: 13px; }
  .roi-row .label { color: var(--text2); }
  .roi-row .val { font-weight: 600; font-variant-numeric: tabular-nums; }

  .comparison-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 24px;
  }
  .comparison-box h3 { margin-bottom: 16px; font-size: 16px; }
  .comp-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
  .comp-item { text-align: center; padding: 20px; border-radius: var(--radius); background: var(--surface2); }
  .comp-item .comp-label { font-size: 12px; color: var(--text2); margin-bottom: 8px; }
  .comp-item .comp-val { font-size: 24px; font-weight: 700; }
  .comp-item .comp-diff { font-size: 13px; margin-top: 6px; }
  .comp-diff.positive { color: var(--green); }
  .comp-diff.negative { color: var(--red); }

  .section-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
  .table-scroll { overflow-x: auto; }

  /* SIMULATOR */
  .sim-total {
    background: linear-gradient(135deg, rgba(79,124,255,0.1), rgba(108,92,231,0.1));
    border: 2px solid var(--accent);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 28px;
    text-align: center;
  }
  .sim-total .label { font-size: 13px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
  .sim-total .value { font-size: 36px; font-weight: 700; color: var(--green); margin-top: 8px; }
  .sim-total .sub { font-size: 14px; color: var(--text2); margin-top: 4px; }

  .sim-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 20px;
  }
  .sim-card h3 { font-size: 16px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
  .sim-card .sim-hint {
    font-size: 12px;
    color: var(--text2);
    margin-top: 12px;
    padding: 10px 14px;
    background: var(--surface2);
    border-radius: 8px;
  }
  .sim-control { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
  .sim-control label { font-size: 13px; color: var(--text2); min-width: 180px; flex-shrink: 0; }
  .sim-control input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    outline: none;
  }
  .sim-control input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 2px solid var(--bg);
    box-shadow: 0 0 0 2px var(--accent);
  }
  .sim-control .sim-val {
    font-size: 20px;
    font-weight: 700;
    min-width: 60px;
    text-align: right;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
  }
  .sim-control select {
    flex: 1;
    padding: 10px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
  }
  .sim-control select:focus { outline: none; border-color: var(--accent); }
  .sim-results { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
  .sim-result { text-align: center; padding: 16px 12px; border-radius: var(--radius); background: var(--surface2); }
  .sim-result .label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.3px; }
  .sim-result .value { font-size: 22px; font-weight: 700; margin-top: 6px; font-variant-numeric: tabular-nums; }
  .sim-result .value.green { color: var(--green); }
  .sim-result .value.red { color: var(--red); }
  .sim-result .value.blue { color: var(--accent); }
  .sim-result .value.orange { color: var(--orange); }

  @media (max-width: 768px) {
    .header { padding: 16px; }
    .tabs { padding: 12px 16px 0; }
    .main { padding: 16px; }
    .kpi-row { grid-template-columns: repeat(2, 1fr); }
    .disclaimer { margin: 12px 16px 0; }
    .charts-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

// ============================
// CALCULATION ENGINE
// ============================
function calcDriver(driverDef, raw) {
  const r = {...raw};
  const driver = DRIVERS.find(d => d.id === driverDef);
  const type = driver ? driver.type : 'own';
  const rate = driver ? driver.rate : 0;
  let kustannukset;
  if (type === 'buy') {
    kustannukset = rate * r.tunnit;
  } else {
    kustannukset = (r.palkka || 0) + (r.muut || 0);
  }
  kustannukset += (r.tuuraus_hinta || 0);
  return {
    ...r, type,
    keskiarvolastaus: r.lastauskerrat > 0 ? r.lastausmin / r.lastauskerrat : 0,
    kustannukset,
    eurPerKeikka: r.keikat > 0 ? kustannukset / r.keikat : 0,
    eurPerH: r.tunnit > 0 ? kustannukset / r.tunnit : 0,
    eurPerKm: r.km > 0 ? kustannukset / r.km : 0,
    kmPerKeikka: r.keikat > 0 ? r.km / r.keikat : 0,
    minPerKeikka: r.keikat > 0 ? (r.tunnit / r.keikat) * 60 : 0,
  };
}

function calcMonth(month) {
  const results = {};
  const data = monthlyData[month];
  DRIVERS.forEach(d => { if (data[d.id]) results[d.id] = calcDriver(d.id, data[d.id]); });
  return results;
}

function calcSummary() {
  const totals = {};
  DRIVERS.forEach(d => {
    totals[d.id] = {keikat:0,km:0,tunnit:0,lastauskerrat:0,lastausmin:0,palkka:0,muut:0,poissaolot:0,tuuraajat:0,tuuraus_hinta:0};
  });
  MONTHS.forEach(m => {
    const data = monthlyData[m];
    DRIVERS.forEach(d => {
      if (data[d.id]) {
        const r = data[d.id];
        totals[d.id].keikat += r.keikat||0; totals[d.id].km += r.km||0;
        totals[d.id].tunnit += r.tunnit||0; totals[d.id].lastauskerrat += r.lastauskerrat||0;
        totals[d.id].lastausmin += r.lastausmin||0; totals[d.id].palkka += r.palkka||0;
        totals[d.id].muut += r.muut||0; totals[d.id].poissaolot += r.poissaolot||0;
        totals[d.id].tuuraajat += r.tuuraajat||0; totals[d.id].tuuraus_hinta += r.tuuraus_hinta||0;
      }
    });
  });
  const results = {};
  DRIVERS.forEach(d => { results[d.id] = calcDriver(d.id, totals[d.id]); });
  return results;
}

function calcROI(vehicle) {
  const sidottuPaaoma = (vehicle.hankinta + vehicle.jaannos) / 2;
  const veKustannusPa = sidottuPaaoma * vehicle.roi_pct;
  const veKustannusKk = veKustannusPa / 12;
  const arvonalenemma = vehicle.hankinta - vehicle.jaannos;
  const arvonalemmaKk = arvonalenemma / vehicle.pitoaika / 12;
  return { sidottuPaaoma, veKustannusPa, veKustannusKk, arvonalenemma, arvonalemmaKk };
}

  const allBuyCost = buyEurPerKeikka * totalKeikat;

  let html = `
    <div class="section-title">Omat vs Ostokuljetukset — vertailu</div>
    <div class="comparison-box">
      <h3>Yksikkokustannusvertailu (H1/2025)</h3>
      <div class="comp-grid">
        <div class="comp-item"><div class="comp-label">\u20ac/keikka — Omat</div><div class="comp-val" style="color:var(--own-color)">${fmtEur(ownEurPerKeikka,1)}</div></div>
        <div class="comp-item"><div class="comp-label">\u20ac/keikka — Ostot</div><div class="comp-val" style="color:var(--buy-color)">${fmtEur(buyEurPerKeikka,1)}</div><div class="comp-diff ${ownEurPerKeikka>buyEurPerKeikka?'positive':'negative'}">${fmtEur(Math.abs(buyEurPerKeikka-ownEurPerKeikka),1)} ero</div></div>
        <div class="comp-item"><div class="comp-label">\u20ac/km — Omat</div><div class="comp-val" style="color:var(--own-color)">${fmtEur(ownEurPerKm,2)}</div></div>
        <div class="comp-item"><div class="comp-label">\u20ac/km — Ostot</div><div class="comp-val" style="color:var(--buy-color)">${fmtEur(buyEurPerKm,2)}</div><div class="comp-diff ${ownEurPerKm>buyEurPerKm?'positive':'negative'}">${fmtEur(Math.abs(buyEurPerKm-ownEurPerKm),2)} ero</div></div>
        <div class="comp-item"><div class="comp-label">\u20ac/h — Omat</div><div class="comp-val" style="color:var(--own-color)">${fmtEur(ownEurPerH,1)}</div></div>
        <div class="comp-item"><div class="comp-label">\u20ac/h — Ostot</div><div class="comp-val" style="color:var(--buy-color)">${fmtEur(buyEurPerH,1)}</div><div class="comp-diff ${ownEurPerH>buyEurPerH?'positive':'negative'}">${fmtEur(Math.abs(buyEurPerH-ownEurPerH),1)} ero</div></div>
      </div>
    </div>
    <div class="comparison-box">
      <h3>Enta jos kaikki ${fmt(totalKeikat)} keikkaa tehtaisiin yhdella mallilla?</h3>
      <div class="comp-grid">
        <div class="comp-item"><div class="comp-label">Kaikki omilla</div><div class="comp-val" style="color:var(--own-color)">${fmtEur(allOwnCost)}</div></div>
        <div class="comp-item"><div class="comp-label">Kaikki ostoilla</div><div class="comp-val" style="color:var(--buy-color)">${fmtEur(allBuyCost)}</div></div>
        <div class="comp-item"><div class="comp-label">Erotus</div><div class="comp-val ${allOwnCost<allBuyCost?'green':'red'}">${fmtEur(Math.abs(allOwnCost-allBuyCost))}</div><div class="comp-diff ${allOwnCost<allBuyCost?'positive':'negative'}">${allOwnCost<allBuyCost?'Omat halvemmat':'Ostot halvemmat'}</div></div>
      </div>
    </div>
    <div class="charts-grid">
      <div class="chart-card"><h3>Kustannusjakauma — Omat vs Ostot</h3><canvas id="chartPie"></canvas></div>
      <div class="chart-card"><h3>Keikkajakauma — Omat vs Ostot</h3><canvas id="chartPieKeikat"></canvas></div>
    </div>
  `;
  return html;
}

// ============================
// SIMULATOR
// ============================
let simState = {lastausMin: 5, replaceDriver: '', absenceDays: 0};

function calcSimLastaus(minReduction) {
  if (minReduction <= 0) return {tunnit: 0, saastoH1: 0, saastoVuosi: 0, lastauskerrat: 0};
  const results = calcSummary();
  let totalLastauskerrat = 0, totalKust = 0, totalTunnit = 0;
  DRIVERS.forEach(d => {
    const c = results[d.id];
    totalLastauskerrat += c.lastauskerrat;
    totalKust += c.kustannukset;
    totalTunnit += c.tunnit;
  });
  const avgEurPerH = totalTunnit > 0 ? totalKust / totalTunnit : 0;
  const vapautuneetTunnit = (minReduction * totalLastauskerrat) / 60;
  const saastoH1 = vapautuneetTunnit * avgEurPerH;
  return {tunnit: vapautuneetTunnit, saastoH1, saastoVuosi: saastoH1 * 2, lastauskerrat: totalLastauskerrat};
}

function calcSimReplace(driverId) {
  if (!driverId) return null;
  const driver = DRIVERS.find(d => d.id === driverId);
  if (!driver || driver.type !== 'buy') return null;
  const results = calcSummary();
  const c = results[driverId];
  if (!c || c.keikat === 0) return null;
  const nykyKust = c.kustannukset;
  const ownDrivers = DRIVERS.filter(d => d.type === 'own');
  let totalMuut = 0, ownCount = 0;
  ownDrivers.forEach(d => {
    const oc = results[d.id];
    if (oc && oc.keikat > 0) { totalMuut += oc.muut; ownCount++; }
  });
  const avgMuutPerKk = ownCount > 0 ? (totalMuut / ownCount) / MONTHS.length : 0;
  const omaPalkkaH1 = 3550 * MONTHS.length;
  const omaMuutH1 = avgMuutPerKk * MONTHS.length;
  const omaKust = omaPalkkaH1 + omaMuutH1;
  const erotus = nykyKust - omaKust;
  let autoHinta = 115000;
  if (driver.cat === 'HIAB') autoHinta = 195000;
  else if (driver.cat === 'Pakut') autoHinta = 73000;
  const takaisinmaksu = erotus > 0 ? autoHinta / (erotus * 2) : null;
  return { driverId, nykyKust, omaKust, erotus, eurPerKeikkaNow: c.eurPerKeikka, eurPerKeikkaOwn: c.keikat > 0 ? omaKust / c.keikat : 0, keikat: c.keikat, autoHinta, takaisinmaksu };
}

function calcSimAbsence(dayReduction) {
  if (dayReduction <= 0) return {saastoH1: 0, saastoVuosi: 0, poistetutPv: 0, totalPoissaolot: 0, avgBuyRate: 57};
  const results = calcSummary();
  let totalPoissaolot = 0;
  DRIVERS.filter(d => d.type === 'own').forEach(d => { totalPoissaolot += results[d.id].poissaolot; });
  const buyDrivers = DRIVERS.filter(d => d.type === 'buy');
  let totalBuyRate = 0;
  buyDrivers.forEach(d => totalBuyRate += d.rate);
  const avgBuyRate = buyDrivers.length > 0 ? totalBuyRate / buyDrivers.length : 57;
  const poistetutPv = dayReduction * MONTHS.length;
  const saastetutTunnit = poistetutPv * 7.5;
  const saastoH1 = saastetutTunnit * avgBuyRate;
  return { saastoH1, saastoVuosi: saastoH1 * 2, poistetutPv, totalPoissaolot, avgBuyRate };
}

function renderSimulator() {
  const sim1 = calcSimLastaus(simState.lastausMin);
  const sim2 = calcSimReplace(simState.replaceDriver);
  const sim3 = calcSimAbsence(simState.absenceDays);
  const totalSaastoVuosi = sim1.saastoVuosi + (sim2 && sim2.erotus > 0 ? sim2.erotus * 2 : 0) + sim3.saastoVuosi;

  const results = calcSummary();
  const buyDriverOpts = DRIVERS.filter(d => d.type === 'buy').map(d => {
    const c = results[d.id];
    const info = c && c.keikat > 0 ? ` (${fmt(c.keikat)} keikkaa, ${fmtEur(c.kustannukset)})` : ' (ei dataa)';
    return `<option value="${d.id}" ${simState.replaceDriver === d.id ? 'selected' : ''}>${d.id}${info}</option>`;
  });

  let totalLastauskerrat = 0, totalLastausmin = 0;
  DRIVERS.forEach(d => { const c = results[d.id]; totalLastauskerrat += c.lastauskerrat; totalLastausmin += c.lastausmin; });
  const avgLastaus = totalLastauskerrat > 0 ? totalLastausmin / totalLastauskerrat : 0;

  let totalPoissaolot = 0;
  DRIVERS.filter(d => d.type === 'own').forEach(d => { totalPoissaolot += results[d.id].poissaolot; });
  const avgPoissaolotPerKk = totalPoissaolot / MONTHS.length;

  let html = `
    <div class="section-title">Tehostamisskenaariot</div>
    <div class="sim-total">
      <div class="label">Valittujen skenaarioiden yhteissaasto</div>
      <div class="value">${totalSaastoVuosi > 0 ? '+' : ''}${fmtEur(totalSaastoVuosi)} / vuosi</div>
      <div class="sub">${fmtEur(totalSaastoVuosi / 2)} puolivuosittain (H1-dataan perustuen)</div>
    </div>

    <div class="sim-card">
      <h3>1. Lastausajan tehostus</h3>
      <p style="font-size:13px;color:var(--text2);margin-bottom:16px;">Lastausajan lyhentaminen vapauttaa tyoaikaa ja laskee yksikkokustannuksia. Liikuta slideria nahdaksesi vaikutus.</p>
      <div class="sim-control">
        <label>Lastausaika lyhenee</label>
        <input type="range" min="0" max="20" step="1" value="${simState.lastausMin}" oninput="simState.lastausMin=+this.value;switchTab('simulaattori')">
        <span class="sim-val">${simState.lastausMin} min</span>
      </div>
      <div class="sim-results">
        <div class="sim-result"><div class="label">Lastauskerrat (H1)</div><div class="value blue">${fmt(sim1.lastauskerrat || totalLastauskerrat)}</div></div>
        <div class="sim-result"><div class="label">Vapautuvat tunnit</div><div class="value blue">${fmt(sim1.tunnit, 0)} h</div></div>
        <div class="sim-result"><div class="label">Saasto H1</div><div class="value green">${fmtEur(sim1.saastoH1)}</div></div>
        <div class="sim-result"><div class="label">Saasto / vuosi</div><div class="value green">${fmtEur(sim1.saastoVuosi)}</div></div>
      </div>
      <div class="sim-hint">Ka. lastausaika nyt: ${fmt(avgLastaus, 1)} min/kerta. Toimipiste A: 62 min vs. Toimipiste B: 30 min — yli 30 min ero samassa prosessissa.</div>
    </div>

    <div class="sim-card">
      <h3>2. Ostokuljettajan korvaaminen omalla</h3>
      <div class="sim-control">
        <label>Valitse ostokuljettaja</label>
        <select onchange="simState.replaceDriver=this.value;switchTab('simulaattori')">
          <option value="">— Valitse —</option>
          ${buyDriverOpts.join('')}
        </select>
      </div>
      ${sim2 ? `
      <div class="sim-results">
        <div class="sim-result"><div class="label">Nykyinen kustannus (H1)</div><div class="value red">${fmtEur(sim2.nykyKust)}</div></div>
        <div class="sim-result"><div class="label">Omana kuljettajana (H1)</div><div class="value blue">${fmtEur(sim2.omaKust)}</div></div>
        <div class="sim-result"><div class="label">${sim2.erotus >= 0 ? 'Saasto' : 'Lisakulu'} H1</div><div class="value ${sim2.erotus >= 0 ? 'green' : 'red'}">${fmtEur(Math.abs(sim2.erotus))}</div></div>
        <div class="sim-result"><div class="label">${sim2.erotus >= 0 ? 'Saasto' : 'Lisakulu'} / vuosi</div><div class="value ${sim2.erotus >= 0 ? 'green' : 'red'}">${fmtEur(Math.abs(sim2.erotus * 2))}</div></div>
        <div class="sim-result"><div class="label">\u20ac/keikka nyt (osto)</div><div class="value red">${fmtEur(sim2.eurPerKeikkaNow, 1)}</div></div>
        <div class="sim-result"><div class="label">\u20ac/keikka omana</div><div class="value blue">${fmtEur(sim2.eurPerKeikkaOwn, 1)}</div></div>
        <div class="sim-result"><div class="label">Auton hankintahinta</div><div class="value orange">${fmtEur(sim2.autoHinta)}</div></div>
        <div class="sim-result"><div class="label">Takaisinmaksuaika</div><div class="value orange">${sim2.takaisinmaksu != null && sim2.takaisinmaksu > 0 ? fmt(sim2.takaisinmaksu, 1) + ' v' : '\u2014'}</div></div>
      </div>
      <div class="sim-hint">Laskelmassa oletetaan oma palkka 3 550 \u20ac/kk + keskimaaraiset muut kulut omien autojen perusteella.</div>
      ` : `
      <div class="sim-results">
        <div class="sim-result" style="grid-column:1/-1;"><div class="label">Valitse ostokuljettaja nahdaksesi vertailu</div><div class="value" style="color:var(--text2);">\u2014</div></div>
      </div>
      <div class="sim-hint">Ostokuljettajat keskimaarin kalliimpia per keikka verrattuna omiin.</div>
      `}
    </div>

    <div class="sim-card">
      <h3>3. Poissaolojen vahentaminen</h3>
      <div class="sim-control">
        <label>Poissaolot vahenevat</label>
        <input type="range" min="0" max="10" step="1" value="${simState.absenceDays}" oninput="simState.absenceDays=+this.value;switchTab('simulaattori')">
        <span class="sim-val">${simState.absenceDays} pv/kk</span>
      </div>
      <div class="sim-results">
        <div class="sim-result"><div class="label">Nykyiset poissaolot (H1)</div><div class="value blue">${fmt(totalPoissaolot)} pv</div></div>
        <div class="sim-result"><div class="label">Vahennetyt paivat (H1)</div><div class="value blue">${fmt(sim3.poistetutPv)} pv</div></div>
        <div class="sim-result"><div class="label">Saasto H1 (tuurauskulut)</div><div class="value green">${fmtEur(sim3.saastoH1)}</div></div>
        <div class="sim-result"><div class="label">Saasto / vuosi</div><div class="value green">${fmtEur(sim3.saastoVuosi)}</div></div>
      </div>
      <div class="sim-hint">Nykyinen poissaolokeskiarvo: ${fmt(avgPoissaolotPerKk, 1)} pv/kk (omat kuljettajat). Tuuraus ostetaan keskihintaan ${fmtEur(sim3.avgBuyRate || 57, 1)}/h.</div>
    </div>
  `;
  return html;
}

// ============================
// CHARTS
// ============================
function destroyCharts() { Object.values(charts).forEach(c => c.destroy()); charts = {}; }

function initSummaryCharts() {
  const results = calcSummary();
  Chart.defaults.color = '#8b8fa3';
  Chart.defaults.borderColor = '#2d3140';
  const driverLabels = DRIVERS.map(d => d.id);
  const driverCosts = DRIVERS.map(d => results[d.id].kustannukset);
  const driverColors = DRIVERS.map(d => d.type==='own' ? 'rgba(79,124,255,0.7)' : 'rgba(255,107,107,0.7)');
  charts.driverCosts = new Chart(document.getElementById('chartDriverCosts'), {
    type: 'bar',
    data: { labels: driverLabels, datasets: [{label:'Kustannukset (\u20ac)', data:driverCosts, backgroundColor:driverColors, borderRadius:6}] },
    options: {responsive:true, plugins:{legend:{display:false}}, scales:{y:{ticks:{callback:v=>fmt(v)+' \u20ac'}}}}
  });
  const monthLabels = MONTHS.map(m => MONTH_NAMES[m]);
  const ownMonthly = MONTHS.map(m => { const res = calcMonth(m); return DRIVERS.filter(d=>d.type==='own').reduce((s,d)=>s+(res[d.id]?res[d.id].kustannukset:0),0); });
  const buyMonthly = MONTHS.map(m => { const res = calcMonth(m); return DRIVERS.filter(d=>d.type==='buy').reduce((s,d)=>s+(res[d.id]?res[d.id].kustannukset:0),0); });
  charts.monthly = new Chart(document.getElementById('chartMonthly'), {
    type: 'bar',
    data: { labels: monthLabels, datasets: [ {label:'Omat', data:ownMonthly, backgroundColor:'rgba(79,124,255,0.7)', borderRadius:6}, {label:'Ostot', data:buyMonthly, backgroundColor:'rgba(255,107,107,0.7)', borderRadius:6} ] },
    options: {responsive:true, plugins:{legend:{position:'top'}}, scales:{y:{ticks:{callback:v=>fmt(v)+' \u20ac'}}}}
  });
  const driverEurKeikka = DRIVERS.map(d => results[d.id].eurPerKeikka);
  charts.eurKeikka = new Chart(document.getElementById('chartEurPerKeikka'), {
    type: 'bar',
    data: { labels: driverLabels, datasets: [{label:'\u20ac/keikka', data:driverEurKeikka, backgroundColor:driverColors, borderRadius:6}] },
    options: {responsive:true, plugins:{legend:{display:false}}, scales:{y:{ticks:{callback:v=>fmt(v,1)+' \u20ac'}}}, indexAxis:'y'}
  });
  const driverEurKm = DRIVERS.map(d => results[d.id].eurPerKm);
  charts.eurKm = new Chart(document.getElementById('chartEurPerKm'), {
    type: 'bar',
    data: { labels: driverLabels, datasets: [{label:'\u20ac/km', data:driverEurKm, backgroundColor:driverColors, borderRadius:6}] },
    options: {responsive:true, plugins:{legend:{display:false}}, scales:{y:{ticks:{callback:v=>v.toFixed(2)+' \u20ac'}}}, indexAxis:'y'}
  });
}

function initComparisonCharts() {
  const results = calcSummary();
  Chart.defaults.color = '#8b8fa3';
  Chart.defaults.borderColor = '#2d3140';
  let ownKust=0, buyKust=0, ownKeikat=0, buyKeikat=0;
  DRIVERS.forEach(d => { const c = results[d.id]; if(d.type==='own'){ownKust+=c.kustannukset;ownKeikat+=c.keikat;}else{buyKust+=c.kustannukset;buyKeikat+=c.keikat;} });
  charts.pie = new Chart(document.getElementById('chartPie'), {
    type: 'doughnut',
    data: { labels: ['Omat','Ostot'], datasets: [{data:[ownKust,buyKust], backgroundColor:['rgba(79,124,255,0.8)','rgba(255,107,107,0.8)'], borderWidth:0}] },
    options: {responsive:true, plugins:{legend:{position:'bottom'}}}
  });
  charts.pieKeikat = new Chart(document.getElementById('chartPieKeikat'), {
    type: 'doughnut',
    data: { labels: ['Omat','Ostot'], datasets: [{data:[ownKeikat,buyKeikat], backgroundColor:['rgba(79,124,255,0.8)','rgba(255,107,107,0.8)'], borderWidth:0}] },
    options: {responsive:true, plugins:{legend:{position:'bottom'}}}
  });
}

// ============================
// TAB SWITCHING
// ============================
let currentTab = 'yhteenveto';

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  destroyCharts();
  const main = document.getElementById('mainContent');
  if (tab === 'yhteenveto') {
    main.innerHTML = renderSummary();
    setTimeout(initSummaryCharts, 50);
  } else if (tab === 'roi') {
    main.innerHTML = renderROI();
  } else if (tab === 'vertailu') {
    main.innerHTML = renderComparison();
    setTimeout(initComparisonCharts, 50);
  } else if (tab === 'simulaattori') {
    main.innerHTML = renderSimulator();
  }
}

document.getElementById('mainTabs').addEventListener('click', e => {
  if (e.target.classList.contains('tab')) switchTab(e.target.dataset.tab);
});

switchTab('yhteenveto');
</script>
